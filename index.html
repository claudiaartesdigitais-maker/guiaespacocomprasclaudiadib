<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guia Espaço de Compras Cláudia Dib</title>
    <style>
        :root { 
            --cor-principal: #673ab7; 
            --cor-secundaria: #9c27b0; 
            --fundo-claro: #fcfaff; 
            --verde-zap: #25d366; 
            --insta-cor: #e1306c;
            --borda: #f0e6ff; 
            --cinza-protecao: #f8f9fa; 
        }
        
        body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background: #fafafa; color: #333; display: flex; flex-direction: column; min-height: 100vh; }
        
        .container-guia { background: white; border-radius: 12px; overflow: hidden; border: 1px solid var(--borda); margin: 15px; flex-grow: 1; box-shadow: 0 4px 15px rgba(103, 58, 183, 0.08); }

        /* === 1. CAPA FIXA === */
        .area-capa-topo { width: 100%; overflow: hidden; background: #fcfaff; display: flex; justify-content: center; }
        .area-capa-topo img { width: 100%; max-width: 100%; height: auto; object-fit: cover; display: block; }

        /* === 2. CARROSSEL DE FOTOS (COLUNA B) === */
        .secao-carrossel-fotos { width: 100%; position: relative; background: #fff; padding: 15px 0; border-bottom: 1px solid var(--borda); display: none; margin-bottom: 10px; }
        .carrossel-container { overflow-x: auto; display: flex; gap: 15px; padding: 0 20px; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .carrossel-container::-webkit-scrollbar { display: none; }
        .slide-foto { flex: 0 0 80%; scroll-snap-align: center; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.08); aspect-ratio: 16 / 9; background: #f5f5f5; }
        .slide-foto img { width: 100%; height: 100%; object-fit: cover; display: block; }

        /* === 3. SELEÇÃO DE LOCAIS === */
        .header-locais { background: var(--cor-principal); border-bottom: 2px solid var(--cor-secundaria); padding: 15px; text-align: center; }
        .header-locais h2 { margin: 0 0 12px 0; font-size: 16px; color: #fff; text-transform: uppercase; letter-spacing: 1px; }
        
        .abas-locais { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .btn-local { background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255, 255, 255, 0.4); padding: 10px 18px; border-radius: 25px; cursor: pointer; color: #fff; font-weight: bold; font-size: 12px; text-transform: uppercase; transition: 0.3s; }
        .btn-local.ativo { background: white; color: var(--cor-principal); border-color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }

        /* Mosaico Superior de Agendas */
        .secao-agenda-datas { background: #fffbff; border-bottom: 1px solid var(--borda); padding: 15px 20px; }
        .titulo-agenda { font-size: 13px; font-weight: bold; color: var(--cor-principal); margin: 0 0 12px 0; text-transform: uppercase; text-align: center; }
        .grade-datas-agenda { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 15px; }
        
        .card-data-status { background: white; border: 1px solid var(--borda); border-radius: 8px; padding: 10px 15px; display: flex; flex-direction: column; align-items: center; min-width: 140px; box-shadow: 0 2px 5px rgba(0,0,0,0.01); text-align: center; }
        .card-data-status .data-texto { font-weight: bold; font-size: 14px; color: #222; margin-bottom: 4px; }
        .card-data-status .selo-status { font-size: 10px; font-weight: bold; text-transform: uppercase; padding: 3px 8px; border-radius: 10px; margin-bottom: 5px; }
        .status-futuro { background: #e8f5e9; color: #2e7d32; }
        .status-ativo { background: #fff3e0; color: #ef6c00; }
        .status-passado { background: #ffebee; color: #c62828; }
        
        .btn-acao-agenda { background: var(--cor-secundaria); color: white; border: none; padding: 6px 12px; border-radius: 12px; font-size: 11px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-acao-agenda:disabled { background: #ccc; cursor: not-allowed; }

        .frase-chamada-geral { max-width: 700px; margin: 10px auto 5px auto; text-align: center; font-size: 13px; color: #673ab7; font-weight: bold; background: #fdf6ff; border: 1px dashed #dcaeff; padding: 10px 15px; border-radius: 8px; line-height: 1.4; box-shadow: 0 2px 6px rgba(103, 58, 183, 0.03); }

        /* Mosaico de Cards de Expositores */
        .grade-expositores { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px; }
        .card-expositor { background: white; border-radius: 12px; border: 1px solid var(--borda); overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.02); display: flex; flex-direction: column; transition: 0.3s; }
        .card-expositor:hover { transform: translateY(-3px); box-shadow: 0 6px 15px rgba(103, 58, 183, 0.1); }
        
        /* CONTAINER MENOR PARA A FOTO (80%) */
        .container-foto-recolhida { width: 100%; background: #fff; padding: 15px 0 15px 0; display: flex; justify-content: center; align-items: center; box-sizing: border-box; }
        .link-foto-clicavel { width: 80%; aspect-ratio: 1 / 1; display: block; overflow: hidden; position: relative; cursor: pointer; border-radius: 8px; border: 1px solid #eee; }
        .foto-expositor { width: 100%; height: 100%; object-fit: cover; background: #f5f5f5; display: block; }
        
        .detalhes-expositor { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; border-top: 1px solid var(--borda); }
        .descricao-trabalho-tag { font-size: 11px; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 8px; line-height: 1.4; background: #f5f5f5; padding: 6px 8px; border-radius: 6px; border-left: 3px solid var(--cor-secundaria); }
        
        .marca-titulo { font-size: 19px; font-weight: 700; color: #222; margin: 0 0 4px 0; text-transform: uppercase; }
        .responsavel-nome { font-size: 13px; color: #666; margin: 0 0 4px 0; font-weight: 500; }
        .data-expositor-tag { font-size: 11px; color: var(--cor-principal); font-weight: bold; margin-bottom: 12px; background: #f5eeff; display: inline-block; padding: 2px 6px; border-radius: 4px; align-self: flex-start; }
        
        .frase-chamada-card { font-size: 11px; color: #673ab7; font-weight: bold; margin-bottom: 12px; background: #fdf6ff; border: 1px dashed #dcaeff; padding: 6px; border-radius: 6px; line-height: 1.3; }

        .botoes-contato { display: flex; gap: 10px; margin-top: auto; }
        .btn-rede { flex: 1; text-align: center; text-decoration: none; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: bold; color: white; display: flex; align-items: center; justify-content: center; gap: 5px; transition: 0.2s; }
        .btn-zap { background: var(--verde-zap); }
        .btn-insta { background: var(--insta-cor); }

        .aviso-evento-breve { grid-column: 1 / -1; text-align: center; padding: 40px 20px; background: #fdfaff; border: 2px dashed var(--borda); border-radius: 12px; margin: 10px 20px; }
        .aviso-evento-breve h3 { margin: 0 0 8px 0; color: var(--cor-principal); font-size: 20px; text-transform: uppercase; }
        .aviso-evento-breve p { margin: 0 0 15px 0; color: #666; font-size: 14px; }

        /* Formulário */
        #sessao-cadastro { display: none; padding: 25px; max-width: 550px; margin: 0 auto; background: #fff; }
        .campo { margin-bottom: 15px; }
        .campo label { display: block; font-weight: bold; font-size: 12px; margin-bottom: 5px; color: #444; }
        .campo input, .campo select, .campo textarea { width: 100%; padding: 11px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
        .btn-enviar { width: 100%; background: var(--cor-principal); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 14px; }

        .banner-protecao { background: var(--cinza-protecao); border-top: 1px solid var(--borda); padding: 15px; text-align: center; font-size: 10px; color: #777; margin-top: auto; }
    </style>
</head>
<body>

<div class="container-guia">
    
    <div class="area-capa-topo">
        <img src="https://raw.githubusercontent.com/claudiaartesdigitais-maker/guiaespacocomprasclaudiadib/main/capa.png" id="img-banner-atual" alt="Espaço de Compras">
    </div>

    <div class="secao-carrossel-fotos" id="area-carrossel">
        <div class="carrossel-container" id="container-fotos-local"></div>
    </div>

    <div class="header-locais">
        <h2>Selecione o Espaço de Compras</h2>
        <div class="abas-locais" id="botoes-abas-dinamicas">
            <span style="font-size:12px; color:#fff;">Sincronizando locais...</span>
        </div>
    </div>

    <div class="secao-agenda-datas" id="area-agenda-dinamica" style="display: none;">
        <div class="titulo-agenda">🗓️ Agenda de Edições e Inscrições</div>
        <div class="grade-datas-agenda" id="corpo-agenda-datas"></div>
        <div class="frase-chamada-geral">
            📣 Confira as marcas presentes, entre em contato e antecipe suas compras ou encomendas direto pelo WhatsApp!
        </div>
    </div>

    <div id="tela-lista">
        <div id="lista-corpo" class="grade-expositores">
            <div id="msg-vazio" style="grid-column: 1/-1; text-align: center; padding: 40px; color: #999;">Carregando expositores oficiais...</div>
        </div>
    </div>

    <div id="sessao-cadastro">
        <div id="conteudo-form">
            <button onclick="fecharFormulario()" style="background:#666; color:white; border:none; padding:6px 12px; border-radius:15px; cursor:pointer; font-size:11px; font-weight:bold; margin-bottom:15px;">⬅ VOLTAR</button>
            <form id="formIndicar">
                <div class="campo"><label>Espaço de Compras</label><input type="text" name="localEvento" id="formLocalVisivel" readonly style="background:#f5f5f5;"></div>
                <div class="campo"><label>Data Escolhida</label><input type="text" name="dataEvento" id="formDataVisivel" readonly style="background:#f5f5f5;"></div>
                <div class="campo"><label>Nome do Responsável</label><input type="text" name="contato" required></div>
                <div class="campo"><label>Nome da Marca / Loja</label><input type="text" name="marca" required></div>
                <div class="campo"><label>Segmento</label><select name="segmento" id="selectSegmento" required></select></div>
                <div class="campo"><label>Descrição dos Produtos</label><textarea name="descricao" rows="3" required></textarea></div>
                <div class="campo"><label>WhatsApp</label><input type="text" name="whatsapp" id="inputZap" required maxlength="11"></div>
                <div class="campo"><label>Instagram</label><input type="text" name="instagram" required></div>
                <div class="campo"><label>Foto do Produto</label><input type="file" name="fotoArquivo" id="fotoArquivo" accept="image/*" required></div>
                <button type="submit" class="btn-enviar" id="btnEnviar">Enviar Inscrição</button>
            </form>
        </div>
    </div>
</div>

<div class="banner-protecao">
    <strong>© Cláudia Dib - Espaço de Compras</strong>
</div>

<script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycby3jRU1Jb-KwI-vvsRTFUV8oB8QILTozuUz77uhHll37fP896uLPzDrJzTvgbo8g5zQpw/exec"; 
    
    let dadosGerais = [];
    let proximasDatas = {};
    let listaSegmentosDoBanco = [];
    let dadosBannersPlanilha = []; 
    let localSelecionado = "";
    let dataSelecionadaForm = "";

    function mudarLocal(novoLocal, elemento) {
        document.querySelectorAll('.btn-local').forEach(b => b.classList.remove('ativo'));
        if(elemento) elemento.classList.add('ativo');
        localSelecionado = novoLocal;
        fecharFormulario();
        atualizarCarrosselDinamico(); 
        filtrarEExibir();
    }

    function abrirFormulario(dataEscolhida) {
        dataSelecionadaForm = dataEscolhida;
        document.getElementById('formLocalVisivel').value = localSelecionado;
        document.getElementById('formDataVisivel').value = dataSelecionadaForm;
        document.getElementById('tela-lista').style.display = "none";
        document.getElementById('sessao-cadastro').style.display = "block";
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function fecharFormulario() {
        document.getElementById('tela-lista').style.display = "block";
        document.getElementById('sessao-cadastro').style.display = "none";
    }

    function formatarDataDoBanco(dataBruta) {
        if (!dataBruta) return "Confirmada";
        let str = dataBruta.toString();
        if (str.includes("GMT") || str.includes(":") || str.includes("-")) {
            try {
                let d = new Date(dataBruta);
                if (!isNaN(d.getTime())) return d.toLocaleDateString('pt-BR');
            } catch(e) {}
        }
        if (str.includes(" ")) str = str.split(" ")[0];
        return str;
    }

    /* === ATUALIZA O CARROSSEL COM TODAS AS IMAGENS DA COLUNA B === */
    function atualizarCarrosselDinamico() {
        const areaCarrossel = document.getElementById('area-carrossel');
        const containerFotos = document.getElementById('container-fotos-local');
        
        if (!localSelecionado || dadosBannersPlanilha.length === 0) {
            areaCarrossel.style.display = "none";
            return;
        }

        // Filtra todas as linhas da aba Banner pertencentes ao local selecionado
        const bannersDoLocal = dadosBannersPlanilha.filter(b => {
            const nomeLocal = b.localEvento || b.local || "";
            return nomeLocal.toString().trim().toLowerCase() === localSelecionado.trim().toLowerCase();
        });

        // Junta todos os links válidos encontrados na coluna "foto" (Coluna B)
        const fotosValidas = bannersDoLocal
            .map(b => b.foto || "")
            .filter(url => url.trim() !== "");

        if (fotosValidas.length > 0) {
            areaCarrossel.style.display = "block";
            containerFotos.innerHTML = fotosValidas.map(url => `
                <div class="slide-foto">
                    <img src="${url.trim()}" onerror="this.src='https://via.placeholder.com/400?text=Espaço+de+Compras'">
                </div>
            `).join('');
        } else {
            areaCarrossel.style.display = "none";
        }
    }

    async function buscarDados() {
        try {
            const res = await fetch(URL_SCRIPT, { redirect: 'follow' });
            const pacoteData = await res.json();
            
            dadosGerais = pacoteData.expositores || [];
            proximasDatas = pacoteData.proximasDatas || {};
            listaSegmentosDoBanco = pacoteData.segmentos || [];
            dadosBannersPlanilha = pacoteData.banners || []; 
            
            const containerAbas = document.getElementById('botoes-abas-dinamicas');
            const listaLocais = pacoteData.locais || [];
            
            if(listaLocais.length > 0) {
                localSelecionado = listaLocais[0]; 
                containerAbas.innerHTML = listaLocais.map((local, index) => {
                    return `<button class="btn-local ${index === 0 ? 'ativo' : ''}" onclick="mudarLocal('${local}', this)">${local}</button>`;
                }).join('');
            }

            const selectSeg = document.getElementById('selectSegmento');
            if(listaSegmentosDoBanco.length > 0) {
                selectSeg.innerHTML = '<option value="">Selecione...</option>' + listaSegmentosDoBanco.map(seg => `<option value="${seg}">${seg}</option>`).join('');
            }
            
            atualizarCarrosselDinamico(); 
            filtrarEExibir();
        } catch (e) { 
            document.getElementById('botoes-abas-dinamicas').innerHTML = `<span style="color:#ff4444;">Erro de conexão.</span>`;
        }
    }

    function converterData(stringData) {
        if (!stringData) return null;
        let alvo = stringData.toString();
        if(alvo.includes(" ")) alvo = alvo.split(" ")[0];
        if(alvo.includes("a")) {
            const partesIntervalo = alvo.split("a");
            alvo = partesIntervalo[partesIntervalo.length - 1].trim();
        }
        const partes = alvo.split('/');
        if (partes.length === 2) return new Date(new Date().getFullYear(), partes[1] - 1, partes[0]);
        if (partes.length === 3) return new Date(partes[2], partes[1] - 1, partes[0]);
        return null;
    }

    function calcularStatusDaData(strData) {
        let hoje = new Date();
        hoje.setHours(0,0,0,0);
        let dataObj = converterData(strData);
        if(!dataObj) return { classe: "status-futuro", texto: "Inscrições Abertas", disabled: false };
        if(hoje.getTime() === dataObj.getTime()) return { classe: "status-ativo", texto: "💥 Acontecendo Hoje", disabled: true };
        if(hoje > dataObj) return { classe: "status-passado", texto: "Encerrado 🔒", disabled: true };
        return { classe: "status-futuro", texto: "Inscrições Abertas", disabled: false };
    }

    function filtrarEExibir() {
        const cuerpo = document.getElementById('lista-corpo');
        const areaAgenda = document.getElementById('area-agenda-dinamica');
        const corpoAgenda = document.getElementById('corpo-agenda-datas');
        
        if (!localSelecionado) return;

        const filtrados = dadosGerais.filter(i => i.localEvento === localSelecionado);
        const arrayDeDatasDoLocal = proximasDatas[localSelecionado] || [];

        /* === RECUPERADO: TRAZ DE VOLTA O COMPORTAMENTO ORIGINAL DAS AGENDAS VAZIAS === */
        if (arrayDeDatasDoLocal.length > 0) {
            areaAgenda.style.display = "block";
            corpoAgenda.innerHTML = arrayDeDatasDoLocal.map(dt => {
                const infoStatus = calcularStatusDaData(dt);
                const dataLimpaVisual = formatarDataDoBanco(dt);
                return `
                    <div class="card-data-status">
                        <div class="data-texto">📅 ${dataLimpaVisual}</div>
                        <span class="selo-status ${infoStatus.classe}">${infoStatus.texto}</span>
                        <button class="btn-acao-agenda" ${infoStatus.disabled ? 'disabled' : ''} onclick="abrirFormulario('${dataLimpaVisual}')">
                            ${infoStatus.disabled ? 'Bloqueado' : 'Inscrever ➕'}
                        </button>
                    </div>
                `;
            }).join('');
        } else {
            areaAgenda.style.display = "block";
            corpoAgenda.innerHTML = `
                <div class="card-data-status" style="min-width: 250px;">
                    <div class="data-texto">📢 EM BREVE NOVAS INSCRIÇÕES!</div>
                    <span class="selo-status status-passado">Inscrições em Breve 🔒</span>
                    <button class="btn-acao-agenda" disabled>Aguardando Calendário</button>
                </div>
            `;
        }
        
        if (filtrados.length === 0) {
            cuerpo.innerHTML = `
                <div class="aviso-evento-breve">
                    <h3>🏛️ ${localSelecionado}</h3>
                    <p>Nenhuma marca ativa na vitrine deste local no momento.</p>
                </div>
            `;
            return;
        }
        
        cuerpo.innerHTML = filtrados.map(item => {
            let urlFoto = item.foto || "";
            if (urlFoto.includes('drive.google.com')) {
                const match = urlFoto.match(/[-\w]{25,}/);
                if (match) urlFoto = `https://drive.google.com/thumbnail?id=${match[0]}&sz=w600`;
            }
            if(!urlFoto) urlFoto = 'https://via.placeholder.com/400?text=Espaço+de+Compras';

            let botaoInsta = item.instagram ? `<a href="${item.instagram}" class="btn-rede btn-insta" target="_blank">📸 Instagram</a>` : "";
            let dataFormatadaExpositor = formatarDataDoBanco(item.dataEvento);
            let descricaoTrabalho = item.descricao && item.descricao.trim() !== "" ? item.descricao : "Artesanato & Variedades";

            return `
                <div class="card-expositor">
                    <div class="container-foto-recolhida">
                        <a href="${item.foto}" target="_blank" class="link-foto-clicavel">
                            <img src="${urlFoto}" class="foto-expositor">
                        </a>
                    </div>
                    <div class="detalhes-expositor">
                        <div class="descricao-trabalho-tag">🎨 ${descricaoTrabalho}</div>
                        <h3 class="marca-titulo">${item.marca || "Expositor"}</h3>
                        <p class="responsavel-nome">👤 Por: ${item.contato}</p>
                        <span class="data-expositor-tag">🗓️ Edição: ${dataFormatadaExpositor}</span>
                        <div class="botoes-contato">
                            <a href="${item.whatsapp}" class="btn-rede btn-zap" target="_blank">📱 WhatsApp</a>
                            ${botaoInsta}
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    const inputZap = document.getElementById('inputZap');
    if(inputZap) inputZap.addEventListener('input', function(e) { this.value = this.value.replace(/\D/g, ''); });

    buscarDados();
</script>
</body>
</html>
